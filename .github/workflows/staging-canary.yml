name: Staging canary

on:
  workflow_dispatch:
    inputs:
      suite:
        description: Canary stage matching the currently deployed build-time flags
        required: true
        default: baseline
        type: choice
        options:
          - baseline
          - lww
          - ladder
          - p1
          - p2
          - p2-rollback
          - p2-review
          - p2-review-rollback
          - p2-review-ops
          - p2-review-ops-rollback
          - full

permissions:
  contents: read

concurrency:
  group: staging-canary
  cancel-in-progress: false

jobs:
  canary:
    name: Staging ${{ inputs.suite }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: staging
      url: ${{ vars.PLAYWRIGHT_BASE_URL }}
    env:
      PLAYWRIGHT_BASE_URL: ${{ vars.PLAYWRIGHT_BASE_URL }}
      PLAYWRIGHT_SMOKE_USER_EMAIL: ${{ secrets.PLAYWRIGHT_SMOKE_USER_EMAIL }}
      PLAYWRIGHT_SMOKE_USER_PASSWORD: ${{ secrets.PLAYWRIGHT_SMOKE_USER_PASSWORD }}
      PLAYWRIGHT_REVIEWER_USER_EMAIL: ${{ secrets.PLAYWRIGHT_REVIEWER_USER_EMAIL }}
      PLAYWRIGHT_REVIEWER_USER_PASSWORD: ${{ secrets.PLAYWRIGHT_REVIEWER_USER_PASSWORD }}
      CANARY_SUITE: ${{ inputs.suite }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate protected staging inputs
        run: >-
          node -e "const required=['PLAYWRIGHT_BASE_URL','PLAYWRIGHT_SMOKE_USER_EMAIL','PLAYWRIGHT_SMOKE_USER_PASSWORD'];
          if(['p2-review','p2-review-ops','p2-review-ops-rollback'].includes(process.env.CANARY_SUITE))required.push('PLAYWRIGHT_REVIEWER_USER_EMAIL','PLAYWRIGHT_REVIEWER_USER_PASSWORD');
          const missing=required.filter((name)=>!process.env[name]?.trim());
          if(missing.length){console.error('Missing staging inputs: '+missing.join(', '));process.exit(1)}"

      - name: Verify staging health
        run: curl --fail --silent --show-error --location --max-time 30 "$PLAYWRIGHT_BASE_URL" > /dev/null

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run selected canary
        shell: bash
        run: |
          case "${{ inputs.suite }}" in
            baseline)
              PLAYWRIGHT_RUN_EXTERNAL_RUNTIME=true pnpm exec playwright test \
                e2e/runner-isolation.spec.ts e2e/anonymous-learning.spec.ts --project=chromium
              ;;
            lww)
              pnpm exec playwright test e2e/progress-sync.spec.ts --project=chromium
              ;;
            ladder)
              pnpm exec playwright test \
                e2e/anonymous-learning.spec.ts e2e/practice-library.spec.ts --project=chromium
              ;;
            p1)
              pnpm exec playwright test e2e/learning-loop.spec.ts --project=chromium
              ;;
            p2)
              pnpm exec playwright test e2e/project-evidence.spec.ts --project=chromium
              ;;
            p2-rollback)
              PLAYWRIGHT_EXPECT_P2_DISABLED=true pnpm exec playwright test \
                e2e/project-evidence-disabled.spec.ts --project=chromium
              ;;
            p2-review)
              PLAYWRIGHT_RUN_P2_REVIEW=true pnpm exec playwright test \
                e2e/project-review.spec.ts --project=chromium
              ;;
            p2-review-rollback)
              PLAYWRIGHT_EXPECT_P2_REVIEW_DISABLED=true pnpm exec playwright test \
                e2e/project-review-disabled.spec.ts --project=chromium
              ;;
            p2-review-ops)
              PLAYWRIGHT_RUN_P2_REVIEW=true PLAYWRIGHT_RUN_P2_REVIEW_OPERATIONS=true \
                pnpm exec playwright test \
                e2e/project-review.spec.ts e2e/project-review-operations.spec.ts \
                --project=chromium
              ;;
            p2-review-ops-rollback)
              PLAYWRIGHT_EXPECT_P2_REVIEW_OPERATIONS_DISABLED=true \
                pnpm exec playwright test \
                e2e/project-review-operations-disabled.spec.ts --project=chromium
              ;;
            full)
              PLAYWRIGHT_RUN_EXTERNAL_RUNTIME=true pnpm test:e2e:smoke
              ;;
            *)
              echo "Unsupported staging canary suite: ${{ inputs.suite }}" >&2
              exit 2
              ;;
          esac

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: staging-${{ inputs.suite }}-playwright-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 7
